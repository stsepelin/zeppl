name: firmware build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: idf.py build (esp32p4)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    steps:
      - uses: actions/checkout@v4

      # The IDF image pre-installs the toolchain at /opt/esp/idf and sets
      # IDF_PATH; sourcing export.sh wires up the rest (PATH, venv, etc.).
      - name: Build firmware
        shell: bash
        working-directory: firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py --no-ccache build

      - name: Report binary size
        if: always()
        shell: bash
        working-directory: firmware
        run: |
          if [ -f build/vrod_gauge.bin ]; then
            ls -la build/vrod_gauge.bin
            size build/vrod_gauge.elf 2>/dev/null || true
          fi

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware
          path: |
            firmware/build/vrod_gauge.bin
            firmware/build/vrod_gauge.elf
            firmware/build/bootloader/bootloader.bin
            firmware/build/partition_table/partition-table.bin
            firmware/build/flasher_args.json
          if-no-files-found: error
