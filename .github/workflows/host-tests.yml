name: host tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Configure
        working-directory: test_apps/host
        run: cmake -B build -S . -DCOVERAGE=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        working-directory: test_apps/host
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: test_apps/host/build
        run: ctest --output-on-failure

      - name: Coverage report
        working-directory: test_apps/host
        run: |
          lcov --capture --directory build --output-file coverage.info \
               --rc branch_coverage=1
          # Strip everything outside the tested-by-policy modules. The set
          # here must match tests/POLICY.md.
          lcov --extract coverage.info \
               '*/main/simulator/gear_table.c' \
               '*/main/simulator/sim_math.c' \
               '*/main/display/format.c' \
               '*/main/display/units.c' \
               '*/main/display/widgets/smooth.c' \
               '*/main/settings/settings.c' \
               '*/main/vehicle/vehicle_data.c' \
               --output-file coverage.tested.info \
               --rc branch_coverage=1
          lcov --list coverage.tested.info --rc branch_coverage=1

      - name: Enforce 100% line + branch on tested-by-policy code
        working-directory: test_apps/host
        run: |
          # Pulls the "lines.....: X%" and "branches..: X%" totals and fails
          # the job if either drops below 100%.
          summary=$(lcov --summary coverage.tested.info --rc branch_coverage=1 2>&1)
          echo "$summary"
          lines=$(echo "$summary" | awk -F'[:%]' '/lines/{gsub(/ /,"",$2);print $2}')
          branches=$(echo "$summary" | awk -F'[:%]' '/branches/{gsub(/ /,"",$2);print $2}')
          if [ "$lines" != "100.0" ] || [ "$branches" != "100.0" ]; then
            echo "::error::coverage below 100% (lines=$lines branches=$branches)"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: test_apps/host/coverage.tested.info
