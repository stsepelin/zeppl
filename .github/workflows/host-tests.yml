name: host tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Configure
        working-directory: firmware/test_apps/host
        run: cmake -B build -S . -DCOVERAGE=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        working-directory: firmware/test_apps/host
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: firmware/test_apps/host/build
        run: ctest --output-on-failure

      - name: Coverage report
        working-directory: firmware/test_apps/host
        run: |
          lcov --capture --directory build --output-file coverage.info \
               --rc branch_coverage=1
          # Strip everything outside the tested-by-policy modules. The set
          # here must match coverage.sh's SCOPED list and the README table.
          lcov --extract coverage.info \
               '*/firmware/main/simulator/gear_table.c' \
               '*/firmware/main/simulator/sim_math.c' \
               '*/firmware/main/display/format.c' \
               '*/firmware/main/display/gesture.c' \
               '*/firmware/main/display/units.c' \
               '*/firmware/main/display/widgets/smooth.c' \
               '*/firmware/main/display/widgets/fuel_scale.c' \
               '*/firmware/main/phone/phone_data.c' \
               '*/firmware/main/phone/phone_protocol.c' \
               '*/firmware/main/settings/settings.c' \
               '*/firmware/main/vehicle/vehicle_data.c' \
               '*/firmware/main/vehicle/gear_calc.c' \
               '*/firmware/main/ble/ble_visibility.c' \
               '*/firmware/main/j1850/j1850_vpw.c' \
               '*/firmware/main/j1850/j1850_tx_logic.c' \
               '*/firmware/main/j1850/j1850_parse.c' \
               '*/firmware/main/j1850/j1850_driver.c' \
               '*/firmware/main/j1850/j1850_edge.c' \
               '*/firmware/main/j1850/ride_log_format.c' \
               '*/firmware/main/display/widgets/sprite_raster.h' \
               '*/firmware/main/display/widgets/fuel_arc.c' \
               '*/firmware/main/display/widgets/gear_indicator.c' \
               '*/firmware/main/display/widgets/speed_display.c' \
               '*/firmware/main/display/widgets/notification_banner.c' \
               '*/firmware/main/display/widgets/media_banner.c' \
               '*/firmware/main/display/widgets/now_playing_display.c' \
               '*/firmware/main/display/widget_util.c' \
               '*/firmware/main/display/widgets/temp_display.c' \
               '*/firmware/main/display/widgets/turn_signals.c' \
               '*/firmware/main/display/widgets/clock_display.c' \
               '*/firmware/main/display/widgets/odometer_display.c' \
               '*/firmware/main/display/widgets/trip_display.c' \
               '*/firmware/main/display/widgets/warning_lights.c' \
               '*/firmware/main/display/widgets/tach_arc.c' \
               --output-file coverage.tested.info \
               --rc branch_coverage=1
          lcov --list coverage.tested.info --rc branch_coverage=1

      - name: Enforce 100% line + branch on tested-by-policy code
        working-directory: firmware/test_apps/host
        run: |
          # Pulls the "lines.....: X%" and "branches..: X%" totals and fails
          # the job if either drops below 100%.
          summary=$(lcov --summary coverage.tested.info --rc branch_coverage=1 2>&1)
          echo "$summary"
          lines=$(echo "$summary" | awk -F'[:%]' '/lines/{gsub(/ /,"",$2);print $2}')
          branches=$(echo "$summary" | awk -F'[:%]' '/branches/{gsub(/ /,"",$2);print $2}')
          if [ "$lines" != "100.0" ] || [ "$branches" != "100.0" ]; then
            echo "::error::coverage below 100% (lines=$lines branches=$branches)"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: firmware/test_apps/host/coverage.tested.info
